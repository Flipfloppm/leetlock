<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Site Blocked — leetlock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
    .problem {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .problem:last-of-type { border-bottom: none; }
    .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .info { flex: 1; min-width: 0; }
    .title { font-size: 15px; font-weight: 500; line-height: 1.4; word-break: break-word; }
    .solved .title { color: #6bff6b; }
    .link {
      display: inline-block;
      margin-top: 4px;
      font-size: 12px;
      color: #4a9eff;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .footer { margin-top: 28px; display: flex; align-items: center; justify-content: space-between; }
    .progress { font-size: 13px; color: #555; }
    .btn {
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: #1a3a1a;
      color: #6bff6b;
    }
    .btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Site Blocked</h1>
    <p class="subtitle">Solve today's problems to unlock browsing.</p>
    <div id="problems"></div>
    <div class="footer">
      <span id="progress" class="progress"></span>
      <button id="continue" class="btn" disabled>Continue</button>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
